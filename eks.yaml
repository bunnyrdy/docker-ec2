apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: expense
  region: us-east-1   # you can keep this if required

managedNodeGroups:
  - name: expense
    instanceTypes:
      - t3.medium
      - t3.large
      - m5.large
      - m5a.large
    desiredCapacity: 3
    minSize: 1
    maxSize: 3
    spot: true